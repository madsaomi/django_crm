<div class="modal fade" id="genericModal" tabindex="-1" aria-labelledby="genericModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: var(--radius-lg);">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold" id="genericModalLabel">{{ title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="genericForm" hx-post="{{ request.path }}" hx-target="#modals-here">
                    {% csrf_token %}
                    <div class="row g-3">
                        {% for field in form %}
                        <div class="col-12">
                            <label class="form-label fw-medium text-muted small mb-1">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {% for error in field.errors %}{{ error }}{% endfor %}
                            </div>
                            {% endif %}
                            {% if field.help_text %}
                            <div class="form-text small opacity-75">{{ field.help_text }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    <div class="modal-footer border-top-0 px-0 pb-0 mt-4">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                            <i class="bi bi-check2-circle"></i> Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
