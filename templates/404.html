{% extends 'base.html' %}
{% block title %}404 - Затерялись?{% endblock %}
{% block content %}
<style>
    .error-wrapper {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .animated-404 {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        font-size: 8rem;
        font-weight: 900;
        line-height: 1;
        color: var(--bs-primary);
        margin-bottom: 2rem;
        perspective: 1000px;
    }
    .digit {
        display: inline-block;
        text-shadow: 0 10px 20px rgba(var(--bs-primary-rgb), 0.2);
        animation: floatDigit 3s ease-in-out infinite;
    }
    .digit:nth-child(3) {
        animation-delay: 1.5s;
    }
    .orb-container {
        width: 100px;
        height: 100px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .floating-orb {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--bs-primary) 0%, var(--bs-info) 100%);
        box-shadow: 0 10px 30px rgba(var(--bs-primary-rgb), 0.5), inset 0 0 20px rgba(255,255,255,0.5);
        animation: rotateOrb 4s linear infinite, bounceOrb 3s ease-in-out infinite;
    }
    .floating-orb::after {
        content: '';
        position: absolute;
        top: 15%; left: 15%;
        width: 30px; height: 30px;
        background: rgba(255,255,255,0.8);
        border-radius: 50%;
        filter: blur(5px);
    }
    
    @keyframes floatDigit {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(5deg); }
    }
    @keyframes bounceOrb {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(0.95); }
    }
    @keyframes rotateOrb {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .error-title {
        font-weight: 800;
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--bs-dark);
    }
    .error-subtitle {
        color: var(--bs-secondary);
        max-width: 500px;
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }
</style>

<div class="error-wrapper page-entry-animate py-5">
    <div class="animated-404">
        <span class="digit">4</span>
        <div class="orb-container">
            <div class="floating-orb"></div>
        </div>
        <span class="digit">4</span>
    </div>
    
    <h1 class="error-title fw-bold" style="color: #1e293b;">Похоже, вы затерялись</h1>
    <p class="error-subtitle mx-auto">
        Страница, которую вы ищете, возможно была перемещена, удалена или её никогда не существовало.
    </p>

    <div class="d-flex gap-3 justify-content-center mt-2">
        <button onclick="window.history.back()" class="btn btn-light rounded-pill px-4 py-2 shadow-sm fw-bold d-flex align-items-center gap-2 border">
            <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i> Назад
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-primary bg-gradient rounded-pill px-4 py-2 shadow-sm fw-bold d-flex align-items-center gap-2">
            <i data-lucide="home" style="width: 18px; height: 18px;"></i> На главную
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
{% endblock %}
