{% extends 'base.html' %}

{% block title %}404 — Страница не найдена{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5" style="min-height:60vh">
    <div class="text-center">
        <div class="mb-4" style="font-size:6rem;line-height:1;font-weight:800;opacity:0.15">404</div>
        <h2 class="fw-bold mb-3">Страница не найдена</h2>
        <p class="text-muted mb-4" style="max-width:400px;margin:0 auto">
            Запрашиваемая страница не существует или была перемещена. Проверьте адрес или вернитесь на главную.
        </p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary px-4 py-2 rounded-3">
            <i class="bi bi-house-fill me-2"></i>На главную
        </a>
    </div>
</div>
{% endblock %}
