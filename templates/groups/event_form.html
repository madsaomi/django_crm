{% extends 'base.html' %}
{% block title %}Добавить Ивент{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Забронировать Воскресенье</h1>
    <a href="{% url 'groups:schedule' %}" class="btn-outline-custom"><i class="bi bi-arrow-left"></i> Назад в расписание</a>
</div>
<div class="form-card">
    <form method="post">{% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn-danger-custom"><i class="bi bi-check-lg"></i> Сохранить бронь</button>
            <a href="{% url 'groups:schedule' %}" class="btn-outline-custom">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
