<!-- HTML-сниппет для модального окна (возвращается сервером при HX-Request) -->
<div class="modal fade" id="genericModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-light border-bottom-0">
        <h5 class="modal-title fw-bold text-dark">{{ modal_title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form hx-post="{{ request.path }}" hx-target="#modals-here" hx-swap="innerHTML">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label text-muted small fw-medium tracking-wider text-uppercase">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
            
            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                <button type="button" class="btn btn-light shadow-sm fw-medium px-4" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary bg-gradient shadow-sm fw-medium px-4">Сохранить</button>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>
