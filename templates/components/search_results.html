{% if results %}
<div class="list-group list-group-flush border-0" id="searchListGroup">
    {% for item in results %}
    <a href="{{ item.url }}" class="list-group-item list-group-item-action border-0 px-4 py-3 d-flex align-items-center gap-3 search-result-item" style="transition: all 0.2s; border-radius: 12px; margin: 4px 8px;">
        <div class="icon-pill-colored pill-indigo" style="width: 42px; height: 42px; flex-shrink: 0;">
            <i data-lucide="{% if item.icon == 'bi-people' or item.icon == 'bi-person' %}user{% elif item.icon == 'bi-collection' %}layers{% elif item.icon == 'bi-person-badge' %}user-check{% else %}search{% endif %}" style="width: 20px; height: 20px;"></i>
        </div>
        <div class="flex-grow-1 overflow-hidden">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h6 class="mb-0 fw-bold text-truncate" style="color: var(--text-primary); font-size: 0.95rem;">{{ item.title|safe }}</h6>
                {% if item.is_active is not None %}
                <div class="ms-2 d-flex align-items-center">
                    <div class="status-indicator {% if item.is_active %}active{% else %}inactive{% endif %}" title="{% if item.is_active %}Активен{% else %}Неактивен{% endif %}"></div>
                </div>
                {% endif %}
            </div>
            <div class="d-flex align-items-center gap-2">
                <small class="text-secondary fw-medium text-truncate" style="font-size: 0.8rem;">{{ item.subtitle|safe }}</small>
            </div>
        </div>
        <i data-lucide="chevron-right" class="text-muted opacity-25" style="width: 16px; height: 16px;"></i>
    </a>
    {% endfor %}
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>

<style>
    .search-result-item:hover {
        background: rgba(99, 102, 241, 0.05) !important;
        transform: translateX(4px);
    }
    .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .status-indicator.active {
        background-color: var(--success);
        box-shadow: 0 0 8px var(--success);
    }
    .status-indicator.inactive {
        background-color: var(--danger);
        box-shadow: 0 0 8px var(--danger);
    }
</style>
{% else %}
{% if q %}
<div class="p-5 text-center">
    <div class="icon-pill-colored pill-slate mx-auto mb-3" style="width: 64px; height: 64px; opacity: 0.5;">
        <i data-lucide="search-x" style="width: 32px; height: 32px;"></i>
    </div>
    <p class="mb-0 fw-bold text-dark">Ничего не найдено</p>
    <small class="text-muted">По запросу «{{ q }}» результатов нет</small>
</div>
<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
{% endif %}
{% endif %}
