{% extends 'base.html' %}

{% block title %}Дашборд{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Дашборд</h1>
</div>

<div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <div class="d-flex gap-2">
        <button hx-get="{% url 'dashboard' %}?period=30" hx-target="#dashboard-content" hx-swap="innerHTML" class="btn {% if period == '30' %}btn-primary{% else %}btn-outline-secondary{% endif %} btn-sm rounded-pill px-3 shadow-sm transition-all">30 дней</button>
        <button hx-get="{% url 'dashboard' %}?period=180" hx-target="#dashboard-content" hx-swap="innerHTML" class="btn {% if period == '180' %}btn-primary{% else %}btn-outline-secondary{% endif %} btn-sm rounded-pill px-3 shadow-sm transition-all">6 месяцев</button>
        <button hx-get="{% url 'dashboard' %}?period=365" hx-target="#dashboard-content" hx-swap="innerHTML" class="btn {% if period == '365' %}btn-primary{% else %}btn-outline-secondary{% endif %} btn-sm rounded-pill px-3 shadow-sm transition-all">1 год</button>
    </div>
</div>

<div id="dashboard-content" class="position-relative" style="min-height: 50vh;">
    <!-- HTMX Indicator Overlay -->
    <div class="htmx-indicator position-absolute top-50 start-50 translate-middle" style="z-index: 10;">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Загрузка...</span></div>
    </div>
    
    {% include 'includes/dashboard_charts.html' %}
</div>

<!-- Load Chart.js here once globally -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    .htmx-request .htmx-indicator { display: block !important; }
    .htmx-indicator { display: none; }
    #dashboard-content { transition: opacity 0.2s ease-in-out; }
    #dashboard-content.htmx-request { opacity: 0.5; pointer-events: none; }
    
    /* Dynamic Active State for Filters */
    .btn-outline-secondary.htmx-request { background: var(--bs-primary); color: white; border-color: var(--bs-primary); }
</style>
<script>
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        // Simple logic to toggle active states of the buttons based on click
        if (evt.target.id === 'dashboard-content') {
            const btns = document.querySelectorAll(`button[hx-get^="{% url 'dashboard' %}"]`);
            btns.forEach(btn => {
                if(btn === evt.detail.elt) {
                    btn.classList.replace('btn-outline-secondary', 'btn-primary');
                } else {
                    btn.classList.replace('btn-primary', 'btn-outline-secondary');
                }
            });
        }
    });
</script>
{% endblock %}
