<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выход — EduCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ef4444; /* Changed to red for logout */
            --primary-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
        }
        
        * { font-family: 'Outfit', sans-serif; }
        
        body { 
            min-height: 100vh; 
            background-color: var(--bg-color);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            overflow: hidden;
            color: var(--text-main);
            margin: 0;
            perspective: 2000px;
        }

        /* Animated background orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .bg-orb-1 {
            width: 400px; height: 400px;
            background: #ef4444; /* Red */
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 500px; height: 500px;
            background: #f59e0b; /* Orange */
            bottom: -200px; right: -100px;
            animation-delay: -5s;
        }
        .bg-orb-3 {
            width: 300px; height: 300px;
            background: #db2777; /* Pink */
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            animation: pulse 8s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) translateZ(0); }
            100% { opacity: 1; transform: translateY(0) translateZ(0); }
        }

        .login-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            padding: 48px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05); 
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            position: relative;
            text-align: center;
        }
        
        .login-brand, .btn-logout, .btn-cancel {
            transform: translateZ(20px);
        }

        .login-brand { 
            margin-bottom: 36px; 
        }
        
        .brand-icon-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, #b91c1c 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.5);
            position: relative;
            transform: translateZ(40px);
        }
        
        .brand-icon-wrapper i { 
            font-size: 2.2rem; 
            color: #ffffff; 
        }

        .login-brand h1 { 
            font-size: 1.75rem; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(25px);
        }
        
        .login-brand p { 
            color: var(--text-muted); 
            font-size: 1.05rem; 
            font-weight: 400;
            transform: translateZ(15px);
        }
        
        .btn-logout { 
            background: linear-gradient(135deg, var(--primary) 0%, #b91c1c 100%);
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.05rem; 
            width: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px -10px rgba(239, 68, 68, 0.6);
            cursor: pointer;
        }
        
        .btn-logout:hover { 
            transform: translateY(-2px) translateZ(30px); 
            box-shadow: 0 14px 24px -10px rgba(239, 68, 68, 0.8); 
            color: #fff; 
        }
        
        .btn-cancel {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px) translateZ(30px);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <div class="login-brand">
                <div class="brand-icon-wrapper">
                    <i class="bi bi-box-arrow-right"></i>
                </div>
                <h1>Выход из системы</h1>
                <p>Вы уверены, что хотите выйти?</p>
            </div>
            
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-logout">
                    Выйти
                    <i class="bi bi-arrow-right-short" style="font-size: 1.4rem; margin-top: 1px;"></i>
                </button>
            </form>
            <a href="{% url 'dashboard' %}" class="btn-cancel">
                Отмена
            </a>
        </div>
    </div>

    <script>
        const card = document.getElementById('loginCard');
        document.addEventListener('mousemove', function(e) {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        document.addEventListener('mouseleave', function() {
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });
    </script>
</body>
</html>
