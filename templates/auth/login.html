<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — EduCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%); display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,.3); }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand i { font-size: 2.5rem; color: #4f46e5; background: #eef2ff; padding: 16px; border-radius: 16px; display: inline-block; margin-bottom: 12px; }
        .login-brand h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .login-brand p { color: #64748b; font-size: 0.9rem; }
        .form-control { border-radius: 10px; padding: 12px 16px; border: 1px solid #e2e8f0; }
        .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
        .btn-login { background: #4f46e5; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 1rem; width: 100%; transition: all .3s; }
        .btn-login:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.4); color: #fff; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: 10px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <i class="bi bi-mortarboard-fill"></i>
            <h1>EduCRM</h1>
            <p>Войдите в систему управления</p>
        </div>
        {% if form.errors %}
        <div class="error-msg">
            <i class="bi bi-exclamation-circle"></i>
            Неверный логин или пароль
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size:.85rem">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" style="font-size:.85rem">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </form>
    </div>
</body>
</html>
