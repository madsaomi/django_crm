{% extends 'base.html' %}
{% block title %}Удалить ученика{% endblock %}
{% block content %}
<div class="d-flex justify-content-center mt-5">
    <div class="delete-card">
        <i class="bi bi-exclamation-triangle d-block"></i>
        <h4>Удалить ученика?</h4>
        <p class="text-muted mb-4">Вы уверены, что хотите удалить <strong>{{ object.name }}</strong>? Это действие нельзя отменить.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Удалить</button>
                <a href="{% url 'students:list' %}" class="btn-outline-custom">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
