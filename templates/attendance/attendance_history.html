{% extends 'base.html' %}
{% block title %}Журнал посещаемости и успеваемости{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
        <div class="icon-pill-colored pill-indigo">
            <i data-lucide="book-open"></i>
        </div>
        <div>
            <h1 class="page-title fw-bold m-0" style="font-size: 1.5rem;">Академический журнал</h1>
            <p class="text-muted small mb-0">Учет посещаемости, подписки и финансового баланса</p>
        </div>
    </div>
    <a href="{% url 'attendance:mark' %}{% if selected_group %}?group={{ selected_group.pk }}{% endif %}" class="btn btn-primary bg-gradient border-0 fw-bold shadow-sm rounded-pill px-4 d-flex align-items-center gap-2">
        <i data-lucide="check-square" style="width: 18px; height: 18px;"></i> Отметить посещаемость
    </a>
</div>

<div class="card border-0 shadow-sm mb-4 glass-panel" style="border-radius: 20px;">
    <div class="card-body p-4">
        <form hx-get="{% url 'attendance:history' %}" 
              hx-target="#journal-body" 
              hx-swap="innerHTML"
              hx-indicator="#loading-bar"
              class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="modern-data-label ms-1">Учебная группа</label>
                <select name="group" class="form-select border shadow-none" style="border-radius: 12px; height: 48px;">
                    <option value="">— Выберите группу —</option>
                    {% for group in groups %}
                    <option value="{{ group.pk }}" {% if selected_group_id == group.pk %}selected{% endif %}>{{ group.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="modern-data-label ms-1">Расчётный месяц</label>
                <input type="month" name="month" class="form-control border shadow-none" style="border-radius: 12px; height: 48px;" value="{{ selected_month }}">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-outline-primary w-100 fw-bold d-flex align-items-center justify-content-center gap-2" style="border-radius: 12px; height: 48px;">
                    <i data-lucide="eye" style="width: 18px; height: 18px;"></i> Показать
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Journal Body (HTMX target) -->
<div id="journal-body">
    {% include 'attendance/partials/journal_table.html' %}
</div>

<style>
    .journal-table th, .journal-table td {
        padding: 12px 8px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
    }
    .journal-date-col {
        width: 60px;
        min-width: 60px;
        border-right: 1px solid rgba(0,0,0,0.03);
    }
    .sticky-col-first {
        position: sticky;
        left: 0;
        z-index: 5;
        border-right: 2px solid var(--border) !important;
    }
    .attendance-cell {
        cursor: pointer;
        transition: all 0.2s;
    }
    .attendance-cell:hover {
        background: rgba(99, 102, 241, 0.03);
    }
    .comment-dot {
        width: 4px;
        height: 4px;
        background: var(--primary);
        border-radius: 50%;
        margin-top: 4px;
    }
</style>

<!-- Modal for updating attendance -->
<div class="modal fade" id="attendanceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 24px; overflow: hidden;">
            <div class="modal-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0">Отметка</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-4" style="background: var(--glass-bg);">
                    <div class="icon-pill-colored sm pill-indigo" id="modalStudentAvatar">?</div>
                    <div>
                        <div class="fw-bold small" id="modalStudentName">...</div>
                        <div class="text-muted" style="font-size: 0.7rem;" id="modalDateInfo">...</div>
                    </div>
                </div>
                
                <input type="hidden" id="modalStudentId">
                <input type="hidden" id="modalDate">
                
                <div class="d-flex justify-content-center gap-3 mb-4">
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="modalStatus" id="modalStatusPresent" value="PRESENT" autocomplete="off">
                        <label class="btn btn-outline-success border shadow-none rounded-4 p-3 w-100 d-flex flex-column align-items-center gap-2 journal-btn-status" for="modalStatusPresent">
                            <i data-lucide="check-circle" style="width: 24px; height: 24px;"></i>
                            <span class="fw-bold small">Был</span>
                        </label>
                    </div>
                    
                    <div class="flex-grow-1">
                        <input type="radio" class="btn-check" name="modalStatus" id="modalStatusAbsent" value="ABSENT" autocomplete="off">
                        <label class="btn btn-outline-danger border shadow-none rounded-4 p-3 w-100 d-flex flex-column align-items-center gap-2 journal-btn-status" for="modalStatusAbsent">
                            <i data-lucide="x-circle" style="width: 24px; height: 24px;"></i>
                            <span class="fw-bold small">Нет</span>
                        </label>
                    </div>
                </div>

                <div id="modalCommentWrapper" style="display: none;">
                    <label class="modern-data-label mb-2">Причина / Комментарий</label>
                    <textarea class="form-control border-0 rounded-4 px-3 py-2" id="modalComment" rows="2" style="font-size: 0.85rem; background: var(--glass-bg);"></textarea>
                </div>
                
                <button type="button" class="btn btn-primary w-100 rounded-pill fw-bold py-3 mt-4" onclick="saveAttendance()">
                    Сохранить изменения
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const groupId = "{{ selected_group.pk|default:'' }}";
    
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });

    document.querySelectorAll('input[name="modalStatus"]').forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'ABSENT') {
                document.getElementById('modalCommentWrapper').style.display = 'block';
                document.getElementById('modalComment').focus();
            } else {
                document.getElementById('modalCommentWrapper').style.display = 'none';
            }
        });
    });

    function openAttendanceModal(studentId, studentName, dateStr, currentStatus, currentComment) {
        document.getElementById('modalStudentId').value = studentId;
        document.getElementById('modalDate').value = dateStr;
        document.getElementById('modalStudentName').innerText = studentName;
        document.getElementById('modalStudentAvatar').innerText = studentName.charAt(0);
        
        const dateParts = dateStr.split('-');
        const formattedDate = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;
        document.getElementById('modalDateInfo').innerText = formattedDate;
        
        document.getElementById('modalComment').value = currentComment || '';
        
        if (currentStatus === 'PRESENT') {
            document.getElementById('modalStatusPresent').checked = true;
            document.getElementById('modalCommentWrapper').style.display = 'none';
        } else if (currentStatus === 'ABSENT') {
            document.getElementById('modalStatusAbsent').checked = true;
            document.getElementById('modalCommentWrapper').style.display = 'block';
        } else {
            document.getElementById('modalStatusPresent').checked = false;
            document.getElementById('modalStatusAbsent').checked = false;
            document.getElementById('modalCommentWrapper').style.display = 'none';
        }
        
        const modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        modal.show();
    }
    
    function saveAttendance() {
        const studentId = document.getElementById('modalStudentId').value;
        const date = document.getElementById('modalDate').value;
        const comment = document.getElementById('modalComment').value;
        const statusEl = document.querySelector('input[name="modalStatus"]:checked');
        
        if (!statusEl) {
            alert('Выберите статус!');
            return;
        }
        
        const status = statusEl.value;
        
        fetch("{% url 'attendance:toggle_api' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                student_id: studentId,
                group_id: groupId,
                date: date,
                status: status,
                comment: comment
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                const modalEl = document.getElementById('attendanceModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                
                const cell = document.getElementById(`cell-${studentId}-${date}`);
                let commentHtml = data.comment ? `<div class="comment-dot" title="${data.comment}"></div>` : '';
                
                if (data.attendance_status === 'PRESENT') {
                    cell.querySelector('div').innerHTML = `
                        <div class="status-indicator active" style="width: 14px; height: 14px; border-radius: 4px;"></div>
                        ${commentHtml}
                    `;
                } else {
                    cell.querySelector('div').innerHTML = `
                        <div class="status-indicator inactive" style="width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                            <span style="font-size: 8px; color: #fff; font-weight: 900;">Н</span>
                        </div>
                        ${commentHtml}
                    `;
                }
                
                cell.setAttribute('onclick', `openAttendanceModal('${studentId}', '${data.student_name.replace(/'/g, "\\'")}', '${date}', '${data.attendance_status}', '${data.comment.replace(/'/g, "\\'")}')`);
            }
        });
    }
</script>
{% endblock %}
